    <script type="text/javascript">
      // GitHub Pages SPA redirect decoder (rafrex/spa-github-pages).
      // Turns a /?/path redirect from 404.html back into a clean /path URL
      // before the router boots. Must run before main.ts.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
